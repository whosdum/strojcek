# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Prerequisites before first deploy:
#   1. Upgrade project to Blaze plan (App Hosting requires it)
#   2. firebase apphosting:backends:create   (creates Cloud Run service + connects GitHub)
#   3. firebase apphosting:secrets:set <NAME> for every server secret below
#
# After first push, App Hosting auto-deploys on every commit to the connected branch.

runConfig:
  # Conservative defaults for staging; raise once you know real load.
  cpu: 1
  memoryMiB: 512
  maxInstances: 5
  minInstances: 0
  concurrency: 80

env:
  # ---- Firebase project (public; baked into client bundle at build) ----
  # NEXT_PUBLIC_FIREBASE_API_KEY is project-scoped, not a secret. Firestore
  # security rules + Auth's authorized domains are what actually gate access.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDUrSB-a7_k3orWrpNLCDR9mcWM8TyZQT4
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: strojcek-staging.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: strojcek-staging
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: strojcek-staging.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "961307537397"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:961307537397:web:c051105329c1f01edd7abc
    availability:
      - BUILD
      - RUNTIME

  # ---- Public app config ----
  - variable: NEXT_PUBLIC_APP_URL
    value: https://strojcek-staging--strojcek-staging.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SHOP_NAME
    value: Strojcek
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SHOP_TIMEZONE
    value: Europe/Bratislava
    availability:
      - BUILD
      - RUNTIME

  # ---- Server-only Firebase Admin SDK ----
  # Project ID is safe as plain value; client_email + private_key go through
  # Cloud Secret Manager.
  - variable: FIREBASE_PROJECT_ID
    value: strojcek-staging
    availability:
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  # ---- Email (nodemailer SMTP) ----
  - variable: EMAIL_FROM
    value: Strojcek <barbershopstrojcek@gmail.com>
    availability:
      - RUNTIME
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME

  # ---- Cron ----
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME

  # ============================================================
  # OPTIONAL secrets — uncomment AFTER pushing each secret to
  # Cloud Secret Manager, otherwise the build fails with
  # `fah/misconfigured-secret`.
  #
  # To re-enable any block below:
  #   1. Uncomment the relevant lines in your local dotenv file
  #   2. Run: ./scripts/setup-apphosting-secrets.sh strojcek-staging
  #      (it will only push the non-empty values)
  #   3. Run: firebase apphosting:secrets:grantaccess <NAMES> \
  #            --backend strojcek-staging --location europe-west4 \
  #            --project strojcek-staging
  #   4. Uncomment the matching block here
  #   5. git commit + push  →  App Hosting auto-redeploys
  # ============================================================
  #
  # ---- Email (real SMTP, e.g. Gmail) ----
  # - variable: SMTP_USER
  #   secret: SMTP_USER
  #   availability:
  #     - RUNTIME
  # - variable: SMTP_PASS
  #   secret: SMTP_PASS
  #   availability:
  #     - RUNTIME
  #
  # ---- SMS (SMSTools.sk) ----
  # - variable: SMSTOOLS_API_KEY
  #   secret: SMSTOOLS_API_KEY
  #   availability:
  #     - RUNTIME
  #
  # ---- Telegram admin notifications ----
  # - variable: TELEGRAM_BOT_TOKEN
  #   secret: TELEGRAM_BOT_TOKEN
  #   availability:
  #     - RUNTIME
  # - variable: TELEGRAM_CHAT_ID
  #   secret: TELEGRAM_CHAT_ID
  #   availability:
  #     - RUNTIME
