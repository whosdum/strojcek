# Firebase App Hosting configuration.
#
# This single yaml works for BOTH `strojcek-staging` and `strojcek-production`
# backends. Per-project values (Firebase Web App config, project URL, project
# ID) are stored as `secret:` references — each Firebase project's Cloud
# Secret Manager holds its own values, so resolution at deploy time produces
# the correct config per backend automatically.
#
# Server credentials: firebase-admin uses Application Default Credentials on
# Cloud Run (no FIREBASE_CLIENT_EMAIL / FIREBASE_PRIVATE_KEY needed in prod —
# Cloud Run identity is auto-bound). Locally `npm run dev` falls back to
# explicit service-account env via the local dotenv file.

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 5
  minInstances: 0
  concurrency: 80

env:
  # ---- Firebase Web App (per-project; resolved from each project's Secret Manager) ----
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # ---- App URL (per-project) ----
  - variable: NEXT_PUBLIC_APP_URL
    secret: NEXT_PUBLIC_APP_URL
    availability:
      - BUILD
      - RUNTIME

  # ---- Server Firebase project ID (used by firebase-admin in dev fallback) ----
  # Mapped from FIREBASE_PROJECT_ID_SECRET to avoid name collision with the
  # auto-injected FIREBASE_CONFIG.projectId that ADC reads from.
  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID_SECRET
    availability:
      - BUILD
      - RUNTIME

  # ---- Shared static config (same across all projects) ----
  - variable: NEXT_PUBLIC_SHOP_NAME
    value: Strojcek
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SHOP_TIMEZONE
    value: Europe/Bratislava
    availability:
      - BUILD
      - RUNTIME

  # ---- Email (nodemailer SMTP) ----
  - variable: EMAIL_FROM
    value: Strojcek <barbershopstrojcek@gmail.com>
    availability:
      - RUNTIME
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME
  - variable: SMTP_USER
    secret: SMTP_USER
    availability:
      - RUNTIME
  - variable: SMTP_PASS
    secret: SMTP_PASS
    availability:
      - RUNTIME

  # ---- SMS (SMSTools.sk) ----
  - variable: SMSTOOLS_API_KEY
    secret: SMSTOOLS_API_KEY
    availability:
      - RUNTIME

  # ---- Telegram admin notifications ----
  - variable: TELEGRAM_BOT_TOKEN
    secret: TELEGRAM_BOT_TOKEN
    availability:
      - RUNTIME
  - variable: TELEGRAM_CHAT_ID
    secret: TELEGRAM_CHAT_ID
    availability:
      - RUNTIME

  # ---- Cron ----
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME

  # ============================================================
  # NOTES on multi-environment:
  #
  # Each Firebase project has its own Cloud Secret Manager. Pushing the
  # same secret name to BOTH `strojcek-staging` and `strojcek-production`
  # with DIFFERENT values produces correct per-environment resolution at
  # build/runtime — the same yaml works for both.
  #
  # Currently shared across both projects (same value):
  #   SMTP_USER, SMTP_PASS, SMSTOOLS_API_KEY,
  #   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, CRON_SECRET
  #
  # Per-project (different values pushed manually per env):
  #   NEXT_PUBLIC_FIREBASE_*, NEXT_PUBLIC_APP_URL, FIREBASE_PROJECT_ID_SECRET
  #
  # firebase-admin uses Application Default Credentials on Cloud Run, so
  # there is NO need for FIREBASE_CLIENT_EMAIL / FIREBASE_PRIVATE_KEY
  # secrets in production. (They remain in local dotenv for `npm run dev`.)
  # ============================================================
